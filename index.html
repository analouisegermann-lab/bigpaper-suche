<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG Paper Suche</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; padding: 16px; }
.search-wrap { position: relative; margin-bottom: 12px; }
.search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; }
.search-input:focus { border-color: #aaa; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #999; }
.result { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px; border: 0.5px solid #e8e8e8; margin-bottom: 6px; cursor: pointer; text-decoration: none; background: #fff; transition: background 0.15s; }
.result:hover { background: #f5f5f5; }
.result-icon { font-size: 18px; color: #555; margin-top: 1px; flex-shrink: 0; }
.result-title { font-size: 14px; font-weight: 500; color: #111; }
.result-path { font-size: 12px; color: #888; margin-top: 2px; }
.result-desc { font-size: 12px; color: #666; margin-top: 3px; }
.no-result { font-size: 14px; color: #999; padding: 12px 0; text-align: center; }
.category-label { font-size: 11px; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin: 10px 0 4px; }
mark { background: #fff3b0; border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" type="text" id="search" placeholder="Stichwort suchen, z.B. Credits, Coaching..." autocomplete="off" />
</div>
<div id="results"></div>

<script>
const entries = [
  { title: "Jahresüberblick", path: "Curriculum", desc: "Überblick über das gesamte Studienjahr", url: "#curriculum-jahresuberblick", icon: "📅" },
  { title: "Herbstsemester", path: "Curriculum", desc: "Module und Inhalte im Herbstsemester", url: "#curriculum-herbstsemester", icon: "🍂" },
  { title: "Frühlingssemester", path: "Curriculum", desc: "Module und Inhalte im Frühlingssemester", url: "#curriculum-fruhlingssemester", icon: "🌸" },
  { title: "Diplomjahr", path: "Curriculum", desc: "Ablauf und Anforderungen im Diplomjahr", url: "#curriculum-diplomjahr", icon: "🎓" },
  { title: "Credits", path: "Curriculum", desc: "Kreditpunkte und Anforderungen", url: "#curriculum-credits", icon: "📊" },
  { title: "Vollzeit-/Teilzeit-Modelle", path: "Curriculum", desc: "Studienmodelle und Zeitmodelle", url: "#curriculum-modelle", icon: "⏱" },
  { title: "Hauptmodule K++V", path: "Module", desc: "Plan, Praxis, Show", url: "#module-hauptmodule", icon: "📦" },
  { title: "Plan", path: "Module → Hauptmodule", desc: "Planungsmodul K++V", url: "#module-plan", icon: "📋" },
  { title: "Praxis", path: "Module → Hauptmodule", desc: "Praxismodul K++V", url: "#module-praxis", icon: "🛠" },
  { title: "Show", path: "Module → Hauptmodule", desc: "Showmodul K++V", url: "#module-show", icon: "🎭" },
  { title: "Wahlpflichtmodule", path: "Module", desc: "Tours, Theorien, Perspektiven, Positionen", url: "#module-wahlpflicht", icon: "📚" },
  { title: "Tours", path: "Module → Wahlpflicht", desc: "Wahlpflichtmodul Tours", url: "#module-tours", icon: "🗺" },
  { title: "Theorien", path: "Module → Wahlpflicht", desc: "Wahlpflichtmodul Theorien", url: "#module-theorien", icon: "💭" },
  { title: "Perspektiven", path: "Module → Wahlpflicht", desc: "Wahlpflichtmodul Perspektiven", url: "#module-perspektiven", icon: "🔭" },
  { title: "Positionen", path: "Module → Wahlpflicht", desc: "Wahlpflichtmodul Positionen", url: "#module-positionen", icon: "📌" },
  { title: "Methodenmodule", path: "Module", desc: "Symposium, Guest Professor", url: "#module-methoden", icon: "🔬" },
  { title: "Symposium", path: "Module → Methoden", desc: "Symposiumsmodul", url: "#module-symposium", icon: "🎤" },
  { title: "Guest Professor", path: "Module → Methoden", desc: "Gastprofessur im Studiengang", url: "#module-guestprof", icon: "👤" },
  { title: "Participation", path: "Module", desc: "Participationsmodul und Einschreibung", url: "#module-participation", icon: "🤝" },
  { title: "+Reflect", path: "Module → Interdisziplinär", desc: "Interdisziplinäres Modul", url: "#module-reflect", icon: "🪞" },
  { title: "Ring- und Abendvorlesungen", path: "Module → Interdisziplinär", desc: "Vorlesungsreihen", url: "#module-ring", icon: "🌙" },
  { title: "+Colabor", path: "Module → Interdisziplinär", desc: "Kollaboratives Modul", url: "#module-colabor", icon: "🔗" },
  { title: "+Focus", path: "Module → Offene Fachmodule", desc: "Offenes Fachmodul", url: "#module-focus", icon: "🎯" },
  { title: "ISA-Module", path: "Module", desc: "Credits und Einschreibung", url: "#module-isa", icon: "🌍" },
  { title: "Praktika", path: "Module", desc: "Praktikumsmöglichkeiten", url: "#module-praktika", icon: "💼" },
  { title: "Austausch", path: "Module", desc: "Andere Studienrichtung HSLU, Partnerhochschule", url: "#module-austausch", icon: "✈️" },
  { title: "Einschreibung K++V-Module", path: "Einschreibung", desc: "Anmeldung für K++V-Module", url: "#einschreibung-kv", icon: "✍️" },
  { title: "Einschreibung Wahlpflichtmodule", path: "Einschreibung", desc: "Anmeldung für Wahlpflichtmodule", url: "#einschreibung-wahl", icon: "✍️" },
  { title: "Einschreibung Participation", path: "Einschreibung", desc: "Anmeldung für Participation", url: "#einschreibung-part", icon: "✍️" },
  { title: "Letter of Intent", path: "Formate", desc: "Format Letter of Intent", url: "#formate-loi", icon: "📝" },
  { title: "Jahresplaner", path: "Formate", desc: "Planung des Studienjahres", url: "#formate-jahresplaner", icon: "🗓" },
  { title: "Kolloquium", path: "Formate", desc: "Kolloquiumsformat", url: "#formate-kolloquium", icon: "🗣" },
  { title: "Feedbackmethoden", path: "Formate", desc: "Methoden für Feedback", url: "#formate-feedback", icon: "💬" },
  { title: "Arbeitsgespräche", path: "Formate", desc: "Format Arbeitsgespräche", url: "#formate-arbeitsgesprache", icon: "💬" },
  { title: "Portfolio", path: "Formate", desc: "Portfolio-Format", url: "#formate-portfolio", icon: "🗂" },
  { title: "Plenum", path: "Formate", desc: "Plenumformat", url: "#formate-plenum", icon: "👥" },
  { title: "Werkschau", path: "Formate", desc: "Abschlusspräsentation", url: "#formate-werkschau", icon: "🖼" },
  { title: "Going public", path: "Formate", desc: "Format Going public", url: "#formate-goingpublic", icon: "📢" },
  { title: "All Inclusive Festival", path: "Formate", desc: "Festival-Format", url: "#formate-festival", icon: "🎪" },
  { title: "Work Life Care Art", path: "Support-Angebote", desc: "Beratung zu Studium und Leben", url: "#support-wlca", icon: "🤝" },
  { title: "Coaching", path: "Support-Angebote", desc: "Persönliches Coaching", url: "#support-coaching", icon: "💡" },
  { title: "Helpdesk", path: "Support-Angebote", desc: "Technische und administrative Hilfe", url: "#support-helpdesk", icon: "🛟" },
  { title: "Fachstelle Diversity", path: "Support-Angebote", desc: "Anlaufstelle für Diversitätsfragen", url: "#support-diversity", icon: "🌈" },
  { title: "Code of Conduct", path: "Support-Angebote", desc: "Verhaltensrichtlinien im Studiengang", url: "#support-coc", icon: "📜" },
  { title: "Barrierefreies Studieren", path: "Support-Angebote", desc: "Unterstützung bei Beeinträchtigungen", url: "#support-barrierefrei", icon: "♿️" },
  { title: "Psychologische Beratungsstelle", path: "Support-Angebote", desc: "Psychologische Unterstützung", url: "#support-psych", icon: "🧠" },
  { title: "Signal-Chats", path: "Digitale Tools", desc: "Kommunikation über Signal", url: "#tools-signal", icon: "💬" },
  { title: "Linkstack", path: "Digitale Tools", desc: "Sammlung wichtiger Links", url: "#tools-linkstack", icon: "🔗" },
  { title: "Agenda", path: "Digitale Tools", desc: "Terminkalender und Agenda", url: "#tools-agenda", icon: "📅" },
  { title: "Ilias", path: "Digitale Tools", desc: "Lernplattform der HSLU", url: "#tools-ilias", icon: "💻" },
  { title: "Instagram", path: "Digitale Tools", desc: "Social Media Kanal K++V", url: "#tools-instagram", icon: "📸" },
  { title: "HSLU-Webseite", path: "Digitale Tools", desc: "Offizielle Website der HSLU", url: "#tools-hslu", icon: "🌐" },
  { title: "Studiengangsleitung", path: "Team", desc: "Leitung des Studiengangs K++V", url: "#team-leitung", icon: "👤" },
  { title: "Dozierende", path: "Team", desc: "Lehrpersonen im Studiengang", url: "#team-dozierende", icon: "👥" },
  { title: "Künstlerische Mitarbeitende", path: "Team", desc: "Künstlerische Mitarbeit", url: "#team-kunstlerisch", icon: "🎨" },
  { title: "Assistierende", path: "Team", desc: "Assistenz im Studiengang", url: "#team-assistierende", icon: "🤲" },
];

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function render(query) {
  const q = query.trim().toLowerCase();
  const container = document.getElementById('results');
  if (!q) { container.innerHTML = ''; return; }

  const filtered = entries.filter(e =>
    e.title.toLowerCase().includes(q) ||
    e.path.toLowerCase().includes(q) ||
    e.desc.toLowerCase().includes(q)
  );

  if (!filtered.length) {
    container.innerHTML = '<div class="no-result">Kein Ergebnis gefunden.</div>';
    return;
  }

  container.innerHTML = filtered.map(e => `
    <a class="result" href="${e.url}">
      <span class="result-icon">${e.icon}</span>
      <div>
        <div class="result-title">${highlight(e.title, query.trim())}</div>
        <div class="result-path">${e.path}</div>
        <div class="result-desc">${e.desc}</div>
      </div>
    </a>
  `).join('');
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
</script>
</body>
</html>
